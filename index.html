<!DOCTYPE html>
<html lang="es" data-dark="0">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>El Lugar · Comunidad</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Lora:ital,wght@0,400;0,500;0,600;1,400;1,600&family=Noto+Serif+Hebrew:wght@300;400;700&display=swap" rel="stylesheet">
<style>
/* ── VARIABLES DE COLOR (claro / oscuro) ── */
:root{
  --te:#003399;--ar:#4b0082;--oro:#c5a059;--oro2:#e8c97a;--oro3:#8a6520;
  --li:#faf7f0;--li2:#f0ebe0;--ca:#8b0000;--txt:#2d2a22;--txt2:#6b6355;
  --sh:rgba(75,0,130,.13);--bg-card:#fff;--bg-card2:#fff;--border:rgba(197,160,89,.28);
}
[data-dark="1"]{
  --li:#12102a;--li2:#1c1a36;--bg-card:#1e1c38;--bg-card2:#252344;
  --txt:#e8e4d8;--txt2:#9d99a0;--sh:rgba(0,0,0,.35);--border:rgba(197,160,89,.18);
}
[data-dark="1"] body{background:var(--li);}
[data-dark="1"] #app-head,[data-dark="1"] #nav{background:rgba(18,16,42,.97);}
[data-dark="1"] .bc{background:linear-gradient(to bottom,#221f42,#1a1835);border-color:rgba(166,124,58,.2);}
[data-dark="1"] .bc-e{color:var(--txt2);}
[data-dark="1"] .qc,[data-dark="1"] .nta,[data-dark="1"] .pc,[data-dark="1"] .stc,[data-dark="1"] .sb,[data-dark="1"] .aks{background:var(--bg-card);}
[data-dark="1"] .lc{background:rgba(18,16,42,.98);}
[data-dark="1"] .cb{background:var(--bg-card);color:var(--txt);}
[data-dark="1"] .cb.rd{background:rgba(75,0,130,.25);}
[data-dark="1"] .mcard,.scard{background:var(--li2) !important;}
[data-dark="1"] .mta,.rf-in,.ig input,.ak-in{background:var(--bg-card) !important;color:var(--txt) !important;border-color:var(--border) !important;}
[data-dark="1"] .mbtn.cn,.rnb{background:var(--bg-card) !important;color:var(--txt) !important;}
[data-dark="1"] .sri{background:var(--bg-card);}

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Lora',Georgia,serif;background:var(--li);color:var(--txt);height:100vh;overflow:hidden;transition:background .3s,color .3s}

/* ── SCREENS ── */
.sc{position:fixed;inset:0;display:none;flex-direction:column;background:var(--li);overflow:hidden}
.sc.on{display:flex}

/* ── SPLASH ── */
#splash{background:linear-gradient(160deg,#12073a 0%,#2a0a52 50%,#3d100a 100%);justify-content:center;align-items:center;text-align:center}
#splash::before{content:'';position:absolute;inset:0;background:url('https://www.transparenttextures.com/patterns/old-map.png');opacity:.07}
.sp-box{position:relative;z-index:1;animation:rise .9s ease}
@keyframes rise{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
.sp-logo{width:150px;height:150px;object-fit:contain;margin-bottom:24px;animation:glow 2.5s ease-in-out infinite;filter:drop-shadow(0 0 18px rgba(197,160,89,.35))}
@keyframes glow{0%,100%{filter:drop-shadow(0 0 14px rgba(197,160,89,.3))}50%{filter:drop-shadow(0 0 32px rgba(197,160,89,.7))}}
.sp-h{font-family:'Cinzel',serif;font-size:2rem;font-weight:900;color:var(--oro2);letter-spacing:5px;text-shadow:0 0 28px rgba(197,160,89,.5)}
.sp-s{font-family:'Cinzel',serif;font-size:.65rem;letter-spacing:9px;color:rgba(197,160,89,.55);margin:6px 0 36px}
.sp-dots{display:flex;gap:9px;justify-content:center}
.sp-d{width:7px;height:7px;border-radius:50%;background:var(--oro);animation:bounce 1.3s ease-in-out infinite}
.sp-d:nth-child(2){animation-delay:.22s}.sp-d:nth-child(3){animation-delay:.44s}
@keyframes bounce{0%,80%,100%{transform:scale(.55);opacity:.35}40%{transform:scale(1);opacity:1}}

/* ── LOGIN ── */
#login{background:linear-gradient(160deg,#12073a,#2a0a52);justify-content:center;align-items:center;padding:28px}
#login::before{content:'';position:absolute;inset:0;background:url('https://www.transparenttextures.com/patterns/old-map.png');opacity:.06}
.lc{position:relative;z-index:1;background:rgba(250,247,240,.98);border-radius:22px;border:1px solid rgba(197,160,89,.38);box-shadow:0 28px 65px rgba(0,0,0,.42);padding:40px 28px;width:100%;max-width:380px;text-align:center;animation:pop .55s ease}
@keyframes pop{from{opacity:0;transform:scale(.94) translateY(12px)}to{opacity:1;transform:scale(1) translateY(0)}}
.lc-logo{width:76px;margin:0 auto 18px;display:block;filter:drop-shadow(0 4px 14px rgba(75,0,130,.2))}
.lc-t{font-family:'Cinzel',serif;font-size:1.65rem;font-weight:700;color:var(--ar);margin-bottom:5px}
.lc-v{font-family:'Lora',serif;font-style:italic;font-size:.78rem;color:var(--txt2);margin-bottom:28px;line-height:1.5}
.ig{position:relative;margin-bottom:13px}
.ig input{width:100%;padding:13px 15px 13px 43px;border:1.5px solid rgba(197,160,89,.38);border-radius:12px;background:#fff;font-family:'Lora',serif;font-size:.93rem;color:var(--txt);outline:none;transition:border-color .3s,box-shadow .3s}
.ig input:focus{border-color:var(--ar);box-shadow:0 0 0 3px rgba(75,0,130,.1)}
.ig-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:1rem;pointer-events:none}
.btn-e{width:100%;background:linear-gradient(135deg,var(--ar),var(--te));color:#fff;border:none;padding:15px;border-radius:12px;font-family:'Cinzel',serif;font-size:.95rem;font-weight:700;letter-spacing:2px;cursor:pointer;box-shadow:0 7px 22px rgba(75,0,130,.3);transition:transform .2s}
.btn-e:active{transform:scale(.97)}
/* Código Líder en Login */
.lider-toggle{font-family:'Cinzel',serif;font-size:.6rem;color:rgba(107,99,85,.5);letter-spacing:2px;cursor:pointer;margin-top:14px;display:block;text-align:center;text-transform:uppercase}
.lider-toggle:hover{color:var(--ar)}
.lider-box{margin-top:10px;overflow:hidden;max-height:0;transition:max-height .3s ease}
.lider-box.open{max-height:90px}
.lider-in{width:100%;padding:11px 13px;border:1.5px dashed rgba(75,0,130,.35);border-radius:10px;font-family:monospace;font-size:.85rem;color:#4b0082;background:#f8f4ff;outline:none;text-align:center;letter-spacing:3px}

/* ── APP ── */
#app{display:none;flex-direction:column;height:100vh}
#app.on{display:flex}
#hdr{background:rgba(250,247,240,.95);backdrop-filter:blur(10px);border-bottom:1.5px solid rgba(197,160,89,.38);padding:13px 15px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;flex-shrink:0;transition:background .3s}
[data-dark="1"] #hdr{background:rgba(18,16,42,.95)}
.hdr-l{display:flex;align-items:center;gap:9px}
#back-btn{background:none;border:none;cursor:pointer;font-size:1.15rem;padding:4px;display:none;color:var(--ar)}
#hdr-t{font-family:'Cinzel',serif;font-size:.95rem;font-weight:700;color:var(--ar);text-transform:uppercase;letter-spacing:1.5px}
.hdr-r{display:flex;gap:6px}
.hdr-btn{background:none;border:none;cursor:pointer;font-size:1.18rem;padding:7px;color:var(--oro3);border-radius:8px;transition:background .2s}
.hdr-btn:active{background:rgba(197,160,89,.2)}
#ca{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:82px}

/* ── NAV ── */
#nav{position:fixed;bottom:0;left:0;right:0;background:rgba(250,247,240,.97);backdrop-filter:blur(10px);border-top:1.5px solid rgba(197,160,89,.38);display:flex;padding:8px 0 max(8px,env(safe-area-inset-bottom));z-index:300;transition:background .3s}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:4px 0;color:rgba(107,99,85,.55);transition:color .25s}
.ni.ac{color:var(--ar)}
.ni-ico{font-size:1.3rem;line-height:1}
.pez-n{width:25px;height:auto;opacity:.45;transition:opacity .25s;filter:grayscale(1)}
.ni.ac .pez-n{opacity:1;filter:none}
.ni-lb{font-family:'Cinzel',serif;font-size:.52rem;font-weight:700;letter-spacing:1px;text-transform:uppercase}

/* ── HOME ── */
.hb{margin:15px;border-radius:16px;overflow:hidden;position:relative;background:linear-gradient(135deg,#12073a,#320c5a);padding:26px 22px;box-shadow:0 9px 32px rgba(75,0,130,.25)}
.hb::before{content:'';position:absolute;inset:0;background:url('https://www.transparenttextures.com/patterns/old-map.png');opacity:.09}
.hb-lb{position:relative;z-index:1;font-family:'Cinzel',serif;font-size:.58rem;letter-spacing:4px;color:var(--oro);text-transform:uppercase;margin-bottom:11px}
.hb-v{position:relative;z-index:1;font-family:'Lora',serif;font-style:italic;font-size:1rem;color:rgba(250,247,240,.95);line-height:1.75;margin-bottom:11px}
.hb-r{position:relative;z-index:1;font-family:'Cinzel',serif;font-size:.68rem;color:var(--oro);letter-spacing:1px}
.hs-t{font-family:'Cinzel',serif;font-size:.7rem;font-weight:700;letter-spacing:3px;color:var(--txt2);text-transform:uppercase;padding:18px 16px 11px;border-bottom:1px solid rgba(197,160,89,.28);margin:0 16px 12px}
.qg{display:grid;grid-template-columns:1fr;gap:11px;padding:0 15px;margin-bottom:18px}
.qc{background:var(--bg-card);border-radius:14px;padding:17px 15px;border:1px solid rgba(197,160,89,.22);box-shadow:0 2px 12px var(--sh);cursor:pointer;transition:transform .2s;display:flex;align-items:center;gap:13px}
.qc:active{transform:scale(.96)}
.qc-i{font-size:1.75rem;flex-shrink:0}.qc-t{font-family:'Cinzel',serif;font-size:.82rem;font-weight:700;color:var(--ar)}
.qc-d{font-size:.72rem;color:var(--txt2);line-height:1.4;margin-top:3px}
.lider-badge{background:linear-gradient(135deg,#4b0082,#003399);color:#e8c97a;font-family:'Cinzel',serif;font-size:.55rem;font-weight:700;letter-spacing:2px;padding:3px 9px;border-radius:20px;margin-left:6px;vertical-align:middle}

/* ── BIBLIOTECA ── */
.ls-hd{padding:18px 15px 8px;display:flex;align-items:center;gap:11px}
.ls-t{font-family:'Cinzel',serif;font-size:.95rem;font-weight:700;color:var(--ar)}
.ls-b{background:rgba(75,0,130,.09);color:var(--ar);border-radius:20px;padding:2px 10px;font-family:'Cinzel',serif;font-size:.62rem;font-weight:600}
.ls-div{height:1px;background:linear-gradient(to right,transparent,rgba(197,160,89,.45),transparent);margin:0 15px 14px}
.bg{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;padding:0 11px;margin-bottom:6px}
.bc{background:linear-gradient(to bottom,#fdf9f0,#f4eddb);border-radius:8px;padding:13px 7px 11px;text-align:center;cursor:pointer;position:relative;overflow:hidden;transition:transform .2s;box-shadow:3px 3px 10px rgba(0,0,0,.11),-1px -1px 3px rgba(255,255,255,.8);border:1px solid rgba(166,124,58,.28)}
.bc::before,.bc::after{content:'';position:absolute;left:0;right:0;height:5px;background:linear-gradient(to right,var(--oro3),var(--oro),var(--oro3));border-radius:2px}
.bc::before{top:0}.bc::after{bottom:0}
.bc:active{transform:scale(.95)}
.bc.fav .bc-n::after{content:'★';position:absolute;top:7px;right:6px;color:var(--oro);font-size:.62rem}
.bc-o{font-family:'Noto Serif Hebrew',serif;font-size:.95rem;font-weight:700;color:var(--ar);line-height:1.25;margin-bottom:2px;min-height:26px;display:flex;align-items:center;justify-content:center}
.bc-o.gr{font-family:'Lora',serif;font-style:italic;font-size:.8rem}
.bc-tr{font-family:'Lora',serif;font-style:italic;font-size:.55rem;color:var(--txt2);margin-bottom:3px;text-align:center;line-height:1.2}
.bc-e{font-family:'Cinzel',serif;font-size:.57rem;font-weight:700;color:var(--txt);text-transform:uppercase;letter-spacing:.4px;border-top:1px dashed rgba(197,160,89,.45);padding-top:5px;margin-top:2px}
.bc-c{font-size:.52rem;color:var(--txt2);margin-top:2px;font-style:italic}

/* ── LIBRO ── */
.lb-hd{padding:22px 15px 14px;text-align:center;background:linear-gradient(to bottom,rgba(75,0,130,.06),transparent)}
.lb-on{font-family:'Noto Serif Hebrew',serif;font-size:2.3rem;color:var(--ar);display:block;margin-bottom:3px}
.lb-on.gr{font-family:'Lora',serif;font-style:italic;font-size:1.7rem}
.lb-en{font-family:'Cinzel',serif;font-size:1.25rem;font-weight:700;color:var(--txt);margin-bottom:7px}
.lb-mt{font-size:.72rem;color:var(--txt2);font-style:italic}
.cg{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;padding:14px}
.cb{aspect-ratio:1;background:var(--bg-card);border:1.5px solid rgba(197,160,89,.32);border-radius:10px;font-family:'Cinzel',serif;font-size:.82rem;font-weight:700;color:var(--ar);cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 6px rgba(0,0,0,.05)}
.cb:active{background:var(--ar);color:#fff;transform:scale(.9)}
.cb.rd{background:rgba(75,0,130,.08);border-color:var(--ar)}

/* ── LECTOR ── */
.rm{padding:14px;text-align:center;background:linear-gradient(to bottom,rgba(75,0,130,.07),transparent);border-bottom:1px solid rgba(197,160,89,.22)}
.rm-b{font-family:'Cinzel',serif;font-size:.72rem;letter-spacing:3px;color:var(--txt2);text-transform:uppercase}
.rm-n{font-family:'Cinzel',serif;font-size:1.9rem;font-weight:900;color:var(--ar);line-height:1}
.rl{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:55px 20px;gap:18px}
.sp{width:48px;height:48px;border:3px solid rgba(197,160,89,.28);border-top-color:var(--oro);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.rl p{font-family:'Lora',serif;font-style:italic;color:var(--txt2);font-size:.88rem}
.vc{padding:18px 19px 26px}
.vv{display:flex;gap:11px;margin-bottom:15px;animation:vIn .35s ease forwards;opacity:0;border-radius:6px;transition:background .25s}
@keyframes vIn{from{opacity:0;transform:translateX(-7px)}to{opacity:1;transform:translateX(0)}}
.vn{font-family:'Cinzel',serif;font-size:.62rem;font-weight:700;color:var(--oro3);min-width:18px;padding-top:5px;text-align:right;cursor:pointer;user-select:none;border-radius:4px;transition:all .15s;padding:4px 3px}
.vn:hover,.vn:active{background:rgba(197,160,89,.2);color:var(--ar)}
.vt{font-family:'Lora',serif;font-size:1rem;line-height:1.82;color:var(--txt);flex:1}

/* ── RESALTADOS ── */
.vv[data-hl="y"]{background:#FFF3A0;border-radius:6px;padding:2px 6px}
.vv[data-hl="g"]{background:#C8F2C8;border-radius:6px;padding:2px 6px}
.vv[data-hl="b"]{background:#BEE0F7;border-radius:6px;padding:2px 6px}
.vv[data-hl="p"]{background:#F7C8F7;border-radius:6px;padding:2px 6px}
.vv[data-hl="r"]{background:#FAD0D0;border-radius:6px;padding:2px 6px}
[data-dark="1"] .vv[data-hl="y"]{background:rgba(255,220,50,.22)}
[data-dark="1"] .vv[data-hl="g"]{background:rgba(80,200,80,.18)}
[data-dark="1"] .vv[data-hl="b"]{background:rgba(80,150,230,.18)}
[data-dark="1"] .vv[data-hl="p"]{background:rgba(200,80,200,.18)}
[data-dark="1"] .vv[data-hl="r"]{background:rgba(220,80,80,.18)}

/* Panel de colores para resaltar */
#hl-panel{position:fixed;bottom:85px;left:50%;transform:translateX(-50%);background:var(--li2);border:1.5px solid rgba(197,160,89,.38);border-radius:18px;padding:12px 18px;display:none;gap:11px;align-items:center;z-index:400;box-shadow:0 8px 30px rgba(0,0,0,.22);animation:su .25s ease}
#hl-panel.on{display:flex}
.hl-dot{width:30px;height:30px;border-radius:50%;cursor:pointer;transition:transform .15s;border:2px solid transparent;flex-shrink:0}
.hl-dot:active{transform:scale(.88)}
.hl-dot.none{background:#fff;border:2px solid #ccc;display:flex;align-items:center;justify-content:center;font-size:.75rem;color:#999}
[data-dark="1"] .hl-dot.none{background:#333;border-color:#555;color:#aaa}
.hl-note-btn{background:var(--ar);color:#fff;border:none;border-radius:12px;padding:7px 13px;font-family:'Cinzel',serif;font-size:.65rem;font-weight:700;cursor:pointer;letter-spacing:1px}

/* ── STRONG'S ── */
.sw{color:var(--te);border-bottom:1.5px dotted var(--te);cursor:pointer;border-radius:2px;padding:0 1px;transition:background .15s}
.sw:active{background:rgba(0,51,153,.13)}
#smod{position:fixed;inset:0;background:rgba(0,0,0,.52);z-index:600;display:none;align-items:flex-end;animation:fi .2s}
#smod.on{display:flex}
.scard{width:100%;background:var(--li);border-radius:20px 20px 0 0;padding:19px 19px 30px;animation:su .3s ease;max-height:80vh;overflow-y:auto}
.s-code{font-family:'Cinzel',serif;font-size:.7rem;letter-spacing:3px;color:var(--oro3);margin-bottom:5px}
.s-word{font-family:'Lora',serif;font-size:1.3rem;font-weight:700;color:var(--ar);margin-bottom:3px}
/* Estilos para el HTML del diccionario Strong */
.s-body b{color:var(--ar);font-family:'Cinzel',serif;font-size:.72rem;letter-spacing:.5px}
.s-body span{font-size:.88rem;color:var(--txt)}
.s-body .NStrong{font-weight:700;color:var(--ar)}
.s-body .Trn{font-style:italic;color:var(--txt2)}
.s-body .Cgr{color:var(--txt2)}
.s-body .Grk,.s-body .heb{font-family:'Noto Serif Hebrew',serif;font-size:1.1rem;color:var(--ar)}
.s-body br{display:block;margin-bottom:4px}
.s-body hr{border:none;border-top:1px solid rgba(197,160,89,.28);margin:9px 0}
.s-link{display:block;text-align:center;padding:11px;border:1.5px solid var(--ar);border-radius:10px;font-family:'Cinzel',serif;font-size:.7rem;font-weight:700;color:var(--ar);text-decoration:none;letter-spacing:1px;margin-top:14px}
.rn{display:flex;gap:11px;padding:14px;border-top:1px solid rgba(197,160,89,.22)}
.rnb{flex:1;padding:11px;border-radius:10px;font-family:'Cinzel',serif;font-size:.7rem;font-weight:700;letter-spacing:1px;cursor:pointer;border:1.5px solid var(--ar);background:var(--bg-card);color:var(--ar);transition:all .2s}
.rnb.pr{background:var(--ar);color:#fff}
.rnb:disabled{opacity:.35;cursor:not-allowed}

/* ── BÚSQUEDA ── */
.sb-wrap{padding:14px;position:sticky;top:0;z-index:10;background:var(--li);border-bottom:1px solid var(--border)}
.sb{display:flex;align-items:center;gap:9px;background:var(--bg-card);border:1.5px solid rgba(197,160,89,.38);border-radius:12px;padding:11px 13px}
.sb input{flex:1;border:none;outline:none;font-family:'Lora',serif;font-size:.93rem;color:var(--txt);background:transparent}
.sr{padding:11px 15px}
.sri{padding:13px;background:var(--bg-card);border-radius:10px;margin-bottom:8px;border:1px solid rgba(197,160,89,.18);cursor:pointer;transition:transform .15s}
.sri:active{transform:scale(.97)}
.sri-r{font-family:'Cinzel',serif;font-size:.67rem;font-weight:700;color:var(--ar);margin-bottom:4px}
.sri-t{font-size:.83rem;color:var(--txt2);font-style:italic}

/* ── COMUNIDAD ── */
.ch{margin:15px;background:linear-gradient(135deg,#12073a,#320c5a);border-radius:16px;padding:26px 18px;text-align:center}
.pez-h{width:65px;margin:0 auto 14px;display:block;filter:invert(1) brightness(.75)}
.ch-t{font-family:'Cinzel',serif;font-size:1.35rem;font-weight:700;color:var(--oro2);margin-bottom:7px}
.ch-s{font-family:'Lora',serif;font-style:italic;color:rgba(250,247,240,.68);font-size:.83rem}
.pc{margin:0 15px 11px;background:var(--bg-card);border-radius:12px;padding:15px;border:1px solid rgba(197,160,89,.18);box-shadow:0 2px 8px var(--sh)}
.ph{display:flex;align-items:center;gap:9px;margin-bottom:9px}
.pa{width:35px;height:35px;border-radius:50%;background:linear-gradient(135deg,var(--ar),var(--te));display:flex;align-items:center;justify-content:center;color:#fff;font-family:'Cinzel',serif;font-size:.82rem;font-weight:700}
.pan{font-family:'Cinzel',serif;font-size:.72rem;font-weight:700;color:var(--ar)}
.pat{font-size:.62rem;color:var(--txt2)}
.pt{font-family:'Lora',serif;font-size:.86rem;line-height:1.6;color:var(--txt);margin-bottom:9px}
.pref{font-family:'Cinzel',serif;font-size:.62rem;color:var(--ar);border-left:2px solid var(--oro);padding-left:7px}
.pact{display:flex;gap:11px;padding-top:9px;border-top:1px solid rgba(197,160,89,.18)}
.pab{font-size:.68rem;color:var(--txt2);cursor:pointer;display:flex;align-items:center;gap:3px}

/* ── NOTAS ── */
.ne{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:55px 20px;gap:14px;text-align:center}

.fab{position:fixed;bottom:90px;right:19px;width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,var(--ar),var(--te));color:#fff;font-size:1.5rem;border:none;cursor:pointer;box-shadow:0 6px 20px rgba(75,0,130,.35);display:none;align-items:center;justify-content:center;z-index:150;transition:transform .2s}

/* ── MODALES ── */
#rfmod{position:fixed;inset:0;background:rgba(0,0,0,.52);z-index:500;display:none;align-items:flex-end;animation:fi .2s}
#rfmod.on{display:flex}
#nmod{position:fixed;inset:0;background:rgba(0,0,0,.52);z-index:500;display:none;align-items:flex-end;animation:fi .2s}

@keyframes fi{from{opacity:0}to{opacity:1}}
.mcard{width:100%;background:var(--li);border-radius:20px 20px 0 0;padding:19px;animation:su .3s ease}

.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:rgba(75,0,130,.92);color:#fff;padding:9px 20px;border-radius:22px;font-family:'Cinzel',serif;font-size:.7rem;z-index:1000;pointer-events:none;animation:fi .3s;white-space:nowrap}

.sd{height:1px;background:linear-gradient(to right,transparent,rgba(197,160,89,.38),transparent);margin:7px 0}

// DICCIONARIO STRONG'S — caché local
// ══════════════════════════════════════════════
let STRONG_G=null, STRONG_H=null, STRONG_LOADING=false;

async function ensureStrongs(isG){
  if(isG){
    if(STRONG_G) return;
    try{
      const r=await fetch('strongs_g.json');
      if(r.ok) STRONG_G=await r.json();
    }catch(e){}
  } else {
    if(STRONG_H) return;
    try{
      const [r1,r2]=await Promise.all([fetch('strongs_h1.json'),fetch('strongs_h2.json')]);
      const d1=r1.ok?await r1.json():{};
      const d2=r2.ok?await r2.json():{};
      STRONG_H={...d1,...d2};
    }catch(e){}
  }
}

// SUSTITUCIONES TERMINOLÓGICAS
// ══════════════════════════════════════════════
function subst(txt){
  return txt
    .replace(/Jesucristo/g,'Yahshua Ha Mashiaj')
    .replace(/jesucristo/g,'yahshua ha mashiaj')
    .replace(/Jesús/g,'Yahshua')
    .replace(/Jesus/g,'Yahshua')
    .replace(/jesús/g,'yahshua')
    .replace(/jesus/g,'yahshua')
    .replace(/Jehová/g,'YHWH')
    .replace(/Jehova/g,'YHWH')
    .replace(/jehová/g,'YHWH')
    .replace(/jehova/g,'YHWH')
    .replace(/Jehovah/g,'YHWH')
    .replace(/Cristo/g,'El Ungido')
    .replace(/cristo/g,'el ungido')
    .replace(/\bDios\b/g,'D-os')
    .replace(/\bdios\b/g,'d-os')
    .replace(/\bPaz\b/g,'Shalom')
    .replace(/\bpaz\b/g,'shalom');
}

// ══════════════════════════════════════════════
// CARGA DE VERSOS — FIX #6: mapas AT_KEY y NT_KEY
// ══════════════════════════════════════════════
async function fetchVersos(l,cap){
  let data;
  // 1. Intenta archivo individual biblia/{id}.json
  try{
    const res=await fetch(`biblia/${l.id}.json`);
    if(res.ok) data=await res.json();
  }catch(e){}

  if(!data){
    // 2. Fallback al archivo combinado bible_at.json / bible_nt.json
    const combined=l.t==='g'?'bible_nt.json':'bible_at.json';
    let res2;
    try{ res2=await fetch(combined); }catch(e){ throw new Error('no_file'); }
    if(!res2.ok) throw new Error('no_file');
    const allBooks=await res2.json();

    // Usar el mapa de claves correcto según el pacto
    const keyMap=l.t==='g'?NT_KEY:AT_KEY;
    const jsonKey=keyMap[l.id]||l.id;

    if(!allBooks[jsonKey]) throw new Error('no_file');
    data=allBooks[jsonKey];
  }

  // Normalizar formatos:
  // Formato A: { "1": ["v1","v2",...] }   (bible_at / bible_nt)
  // Formato B: { "1": {"1":"v1",...} }
  // Formato C: [ {chapter,verse,text} ]
  let versos=[];

  if(Array.isArray(data)){
    versos=data
      .filter(v=>v.chapter===cap||v.cap===cap||v.capitulo===cap)
      .map(v=>({n:v.verse||v.versiculo||v.v,t:v.text||v.texto||v.t}));
  } else {
    const ch=data[cap]||data[String(cap)];
    if(!ch) throw new Error('formato_desconocido');
    if(Array.isArray(ch)){
      versos=ch.map((t,i)=>({n:i+1,t:String(t)}));
    } else {
      versos=Object.entries(ch).map(([n,t])=>({n:Number(n),t:String(t)}));
    }
  }

  if(!versos.length) throw new Error('sin_versos');
  return versos.map(v=>({...v,t:subst(v.t)}));
}

// ══════════════════════════════════════════════
// STRONG'S CONCORDANCE — FIX #2
// ══════════════════════════════════════════════
function parseVerseText(txt){
  // Convierte {palabra|G652} → span clicable
  return txt.replace(/\{([^|{}]+)\|([GH]\d+)\}/g,(_,word,code)=>
    `<span class="sw" data-s="${code}" data-w="${word.replace(/"/g,'&quot;')}" onclick="event.stopPropagation();showStrong(this.dataset.s,this.dataset.w)">${word}</span>`
  );
}

async function showStrong(code,word){
  const isG=code[0]==='G';
  const num=parseInt(code.slice(1));
  document.getElementById('s-code').textContent=code;
  document.getElementById('s-word').textContent=word;
  document.getElementById('s-body').innerHTML=`<div style="display:flex;justify-content:center;padding:18px"><div class="sp"></div></div>`;
  document.getElementById('s-link').href=`https://www.blueletterbible.org/lexicon/${code}/rvr60/${isG?'tr':'wlc'}/0-1/`;
  document.getElementById('smod').classList.add('on');

  // Cargar diccionario local primero
  await ensureStrongs(isG);
  const dict=isG?STRONG_G:STRONG_H;
  if(dict && dict[code]){
    document.getElementById('s-body').innerHTML=dict[code];
    return;
  }

  // Fallback a la API externa
  try{
    const res=await fetch(`https://api.getbible.net/v2/strongs/${isG?'greek':'hebrew'}/${num}.json`);
    if(res.ok){
      const d=await res.json();
      const translit=d.translit||d.transliteration||'';
      const gloss=d.gloss||d.brief||d.title||'';
      const def=d.strongs_def||d.eng||d.kjv_def||d.def||'';
      document.getElementById('s-body').innerHTML=`
        ${translit?`<b>Transliteración: </b><span class="Trn">${translit}</span><br>`:''}
        ${gloss?`<b>Glosa: </b><span>${gloss}</span><br>`:''}
        ${def?`<hr><span style="line-height:1.75;font-size:.88rem">${def}</span>`:''}
        ${(!translit&&!gloss&&!def)?`<span style="color:var(--txt2);font-style:italic">Código Strong: ${code}</span>`:''}
      `;
      return;
    }
  }catch(e){}
  document.getElementById('s-body').innerHTML=`<span style="color:var(--txt2);font-style:italic">Tocá "Ver en Diccionario Bíblico completo" para más detalles.</span>`;
}

}

      <div class="sb"><span>🔍</span><input id="sb-in" type="text" placeholder="Buscar libro o pasaje..." oninput="doSearch(this.value)"></div>
    </div>
    <div class="sr" id="sr"><div style="padding:28px;text-align:center;font-family:'Lora',serif;font-style:italic;color:var(--txt2)">Escribe para buscar entre los 66 libros...</div></div>
  `;
}
function doSearch(q){
  const el=document.getElementById('sr');
  if(!q||q.length<1){el.innerHTML=`<div style="padding:28px;text-align:center;font-family:'Lora',serif;font-style:italic;color:var(--txt2)">Escribe para buscar...</div>`;return}
  const nrm=s=>s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
  const ql=nrm(q);
  const m=ALL.filter(l=>nrm(l.e).includes(ql)||l.o.toLowerCase().includes(ql));
  if(!m.length){el.innerHTML=`<div style="padding:28px;text-align:center;font-family:'Lora',serif;font-style:italic;color:var(--txt2)">Sin resultados para "${q}"</div>`;return}
  el.innerHTML=m.map(l=>`
    <div class="sri" onclick="openFromSearch('${l.id}')">
      <div class="sri-r">${l.e} · ${l.t==='h'?'Antiguo Pacto':'Pacto Renovado'} · ${l.c} capítulos</div>
      <div class="sri-t">${l.o}</div>
    </div>`).join('');
}
function openFromSearch(id){
  const l=getLibro(id);
  document.querySelector('[data-t=biblioteca]').classList.add('ac');
  S.tab='biblioteca'; S.hist=[];
  openLibro(l);
}

// REFLEXIONES DE LÍDERES — FIX #4
// ══════════════════════════════════════════════
function openRefModal(){
  if(!S.user.esLider){ toast('⚠️ Solo los líderes pueden publicar reflexiones'); return; }
  document.getElementById('rf-titulo').value='';
  document.getElementById('rf-ta').value='';
  document.getElementById('rfmod').classList.add('on');
  setTimeout(()=>document.getElementById('rf-titulo').focus(),200);
}
function closeRefModal(){document.getElementById('rfmod').classList.remove('on')}
function saveRef(){
  if(!S.user.esLider) return;
  const titulo=document.getElementById('rf-titulo').value.trim();
  const texto=document.getElementById('rf-ta').value.trim();
  if(!texto) return;
  S.reflexiones.push({
    titulo,texto,
    autor:`${S.user.n} ${S.user.a}`.trim()||'Líder',
    fecha:new Date().toLocaleDateString('es-AR',{day:'2-digit',month:'long',year:'numeric'})
  });
  sv('el_reflexiones',S.reflexiones);
  closeRefModal();
  toast('✅ Reflexión publicada');
  if(S.tab==='inicio') rInicio();
}

// ══════════════════════════════════════════════
// NOTAS — FIX #5: FAB no queda pegado
// ══════════════════════════════════════════════
function rNotas(){
  const ca=document.getElementById('ca');
  if(!S.notas.length){
    ca.innerHTML=`<div class="ne fade"><div class="ne-i">✍️</div><div class="ne-t">Aún no tienes notas.<br>Abre un capítulo y agrega tu primera reflexión.</div></div>`;
  } else {
    ca.innerHTML=`
      <div style="padding:14px 15px 8px;font-family:'Cinzel',serif;font-size:.62rem;letter-spacing:3px;color:var(--txt2);text-transform:uppercase">${S.notas.length} Reflexión${S.notas.length!==1?'es':''}</div>
      ${[...S.notas].reverse().map((n,i)=>`
      <div class="nta fade" style="cursor:pointer" onclick="editNota(${S.notas.length-1-i})">
        <div class="nta-r">📖 ${n.libro}${n.cap?' · Cap. '+n.cap:''}${n.versiculo?' · v.'+n.versiculo:''}</div>
        <div class="nta-t">${n.texto}</div>
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div class="nta-f">${n.fecha}</div>
          <div style="display:flex;gap:11px;align-items:center">
            <div onclick="event.stopPropagation();editNota(${S.notas.length-1-i})" style="color:var(--ar);font-size:.72rem;cursor:pointer;font-family:Cinzel,serif">Editar</div>
            <div onclick="event.stopPropagation();delNota(${S.notas.length-1-i})" style="color:#8b0000;font-size:.72rem;cursor:pointer;font-family:Cinzel,serif">Eliminar</div>
          </div>
        </div>
      </div>`).join('')}
      <div style="height:20px"></div>
    `;
  }
  showFab();
}
function showFab(){document.getElementById('fab').style.display='flex'}
function hideFab(){document.getElementById('fab').style.display='none'}

function openModal(ctx){
  S.notaEditIdx=null;
  S.notaCtx=ctx||{libro:S.libro?.e||'—',cap:S.cap||'—',versiculo:null};
  const refEl=document.getElementById('mod-ref');
  if(ctx?.versiculo){
    document.getElementById('mod-t').textContent=`Nota · ${ctx.libro} ${ctx.cap}:${ctx.versiculo}`;
    refEl.textContent=`📖 Vinculada a ${ctx.libro} ${ctx.cap}:${ctx.versiculo}`;
    refEl.style.display='block';
  } else {
    document.getElementById('mod-t').textContent=`Nota · ${S.notaCtx.libro} ${S.notaCtx.cap}`;
    refEl.style.display='none';
  }
  document.getElementById('mod-ta').value='';
  document.getElementById('nmod').classList.add('on');
  setTimeout(()=>document.getElementById('mod-ta').focus(),200);
}
function editNota(i){
  S.notaEditIdx=i;
  const n=S.notas[i];
  const refEl=document.getElementById('mod-ref');
  document.getElementById('mod-t').textContent=`Editar · ${n.libro} ${n.cap}`;
  if(n.versiculo){
    refEl.textContent=`📖 ${n.libro} ${n.cap}:${n.versiculo}`;
    refEl.style.display='block';
  } else {
    refEl.style.display='none';
  }
  document.getElementById('mod-ta').value=n.texto;
  document.getElementById('nmod').classList.add('on');
  setTimeout(()=>document.getElementById('mod-ta').focus(),200);
}
function closeModal(){document.getElementById('nmod').classList.remove('on')}
function saveNota(){
  const txt=document.getElementById('mod-ta').value.trim();
  if(!txt) return;
  if(S.notaEditIdx!==null){
    S.notas[S.notaEditIdx].texto=txt;
    S.notas[S.notaEditIdx].fecha=new Date().toLocaleDateString('es-AR',{day:'2-digit',month:'long',year:'numeric'})+' (editada)';
    S.notaEditIdx=null;
  } else {
    S.notas.push({
      libro:S.notaCtx?.libro||'—',
      cap:S.notaCtx?.cap||'—',
      versiculo:S.notaCtx?.versiculo||null,
      texto:txt,
      fecha:new Date().toLocaleDateString('es-AR',{day:'2-digit',month:'long',year:'numeric'})
    });
  }
  sv('el_notas',S.notas);
  closeModal();
  toast('✅ Nota guardada');
  if(S.tab==='notas') rNotas();
}
function delNota(i){
  S.notas.splice(i,1);
  sv('el_notas',S.notas);
  rNotas();
}

  `;
}

function toggleDark(){
  const newVal=!S.darkMode;
  applyDark(newVal);
  // Actualizar el toggle visual sin re-renderizar todo
  const t=document.getElementById('dark-toggle');
  if(t) t.classList.toggle('on',newVal);
  toast(newVal?'🌙 Modo oscuro activado':'☀️ Modo claro activado');
}

function logout(){
  if(confirm('¿Cerrar sesión? Se conservarán tus notas y favoritos.')){
    localStorage.removeItem('el_user');
    location.reload();
  }
}

// ══════════════════════════════════════════════
// TOAST
// ══════════════════════════════════════════════
function toast(msg){
  const t=document.createElement('div');
  t.className='toast'; t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(()=>t.style.opacity='0',1700);
  setTimeout(()=>t.remove(),2000);
}

// ══════════════════════════════════════════════
// TECLADO
// ══════════════════════════════════════════════
document.addEventListener('keydown',e=>{
  if(e.key==='Enter'&&document.getElementById('login').classList.contains('on')) doLogin();
  if(e.key==='Escape'){closeModal();closeStrong();closeRefModal();hideHLPanel();}
});

// Cerrar panel de resaltado al tocar fuera
document.addEventListener('click',e=>{
  const panel=document.getElementById('hl-panel');
  if(panel.classList.contains('on') && !panel.contains(e.target) && !e.target.classList.contains('vn')){
    hideHLPanel();
  }
});
</script>
